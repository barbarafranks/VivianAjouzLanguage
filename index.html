  {

    "passageHtml": "<div class=\"passage-label\">Read this</div><div class=\"passage-box\">After running three laps at recess, Maya flopped onto the bench. \"I'm so tired,\" she said. \"My legs are noodles!\"</div>",
    "qHtml": "What does Maya mean when she says <span class=\"q-ul\">\"My legs are noodles\"</span>?",
    "tip": "When something can't really be true in real life, the writer is using figurative language. Ask yourself: can a person's legs actually turn into noodles? Then think about what noodles are like.",
    "hint": "Maya just ran three laps and is very tired. Think about how noodles feel when you pick them up — are they stiff and strong, or soft and wobbly? That tells you how her legs feel.",

      "Her legs feel weak and wobbly from running.",
      "She is eating noodles for a snack at recess.",
      "Her legs are actually made out of spaghetti.",
      "She wants noodles for dinner tonight."
    ],
    "ans": 0,
    "wrongs": [
      null,
      "This mixes up the sentence with a real snack. Maya is talking about how her legs feel after running, not about food she is eating.",
      "This is the literal meaning, but legs cannot really turn into noodles. The writer is comparing her tired legs to soft, floppy noodles — it's figurative language.",

    ],
    "exp": "\"My legs are noodles\" is figurative language — a comparison, not a fact. Since Maya just ran three laps, the writer is comparing her tired, wobbly legs to soft, floppy noodles. A common Grade 3 mistake is taking phrases like this literally (thinking legs really became pasta). Always check: could this really happen? If not, look for clues in the story to find the figurative meaning.",
    "skill": "Figurative vs. literal language",
    "sc": "#993556",
    "sb": "#FBEAF0",
    "teks": "L.3.4.D",
    "mapsTo": "→ G3.5 Prep",
    "n": 1
  },
  {
    "type": "std",
    "passageHtml": "<div class=\"passage-label\">Read this</div><div class=\"passage-box\">Maya and her brother built a sandcastle at the beach. They worked together for two hours before the waves washed it away.</div>",
    "qHtml": "Which word in the second sentence is a <span class=\"q-ul\">pronoun</span>?",

    "opts": [
      "They",
      "worked",
      "waves",
      "sandcastle"

    "ans": 0,
    "wrongs": [

    ],
    "exp": "'They' is a pronoun because it replaces the noun phrase 'Maya and her brother' from the first sentence. A common Grade 3 mistake is confusing nouns (people, places, things) with pronouns (words like he, she, it, they, we) that stand in for those nouns. Remember: pronouns are short replacement words — nouns are the actual names.",
    "skill": "Nouns and Pronouns (Grade 3)",

    "n": 2

  {
    "type": "std",
    "passageHtml": "<div class=\"passage-label\">Read this sentence</div><div class=\"passage-box\">Maya looked at the puppy and said I want to name him Biscuit.</div>",
    "qHtml": "Which choice shows the correct way to write the <span class=\"q-ul\">dialogue</span> in this sentence?",
    "tip": "In dialogue, put a comma BEFORE the opening quotation mark, and put the ending punctuation INSIDE the closing quotation mark. Quotation marks wrap only the exact words the speaker says.",
    "hint": "The speaker's exact words are: I want to name him Biscuit. Those words (and the period at the end) must go inside the quotation marks, with a comma right after 'said'.",
    "opts": [
      "Maya looked at the puppy and said, \"I want to name him Biscuit.\"",
      "Maya looked at the puppy and said \"I want to name him Biscuit.\"",
      "Maya looked at the puppy and said, \"I want to name him Biscuit\".",
      "Maya looked at the puppy and said, I want to name him Biscuit."
    ],
    "ans": 0,
    "wrongs": [
      null,
      "This is missing the comma after 'said'. A comma is needed before the opening quotation mark to separate the speaker tag from the spoken words.",
      "The period is placed OUTSIDE the closing quotation mark. In dialogue, the ending punctuation (period, question mark, or exclamation mark) goes INSIDE the closing quotation mark.",
      "This is missing the quotation marks around the spoken words. Whenever a character speaks, their exact words must be wrapped in quotation marks (\" \")."
    ],
    "exp": "The correct answer uses all three dialogue rules: (1) a comma after the speaker tag 'said' to introduce the quote, (2) opening and closing quotation marks around the exact words spoken, and (3) the period placed INSIDE the closing quotation mark. This mirrors the most common Grade 3 mistakes for L.3.2.C — forgetting the comma before the quote, placing the period outside the quotes, or leaving off the quotation marks entirely.",
    "skill": "Commas and Quotation Marks in Dialogue",

    "sb": "#FAEEDA",
    "teks": "L.3.2.C",
    "mapsTo": "→ G3.5 Prep",
    "n": 3
  },
  {
    "type": "std",
    "passageHtml": null,
    "qHtml": "Which sentence uses <span class=\"q-ul\">commas</span> correctly?",
    "tip": "When you list three or more things in a sentence, put a comma after each item except the last one. Also check that addresses have a comma between the city and state.",
    "hint": "Look for a list of items or a city and state. Each item in a list needs a comma after it, and you need a comma between the city name and the state name.",
    "opts": [

      "For the picnic we packed sandwiches grapes and cookies.",
      "For the picnic, we packed sandwiches grapes, and cookies.",
      "For the picnic, we packed, sandwiches, grapes, and cookies."
    ],
    "ans": 0,
    "wrongs": [

    ],
    "exp": "When you list three or more items in a series, place a comma after each item except the last one: 'sandwiches, grapes, and cookies.' This is the same rule used in address questions, where commas separate the city from the state (like 'Austin, Texas'). The comma's job is to keep items in a list clearly separated so readers can tell them apart.",

  {
    "type": "std",
    "passageHtml": "<div class=\"passage-label\">Read this</div><div class=\"passage-box\">Maya and her brother love to bake cookies on Saturday mornings. They mix the dough together, and then ___ puts the tray in the oven.</div>",

var cur=0, sel=null, ddSel=null, submitted=false;
var scores=QS.map(function(){return null;});
var tried=QS.map(function(){return [];});
var lastWrong=null, hintOn=false, hintOpen=false, STATE='quiz';
var _saveStatus='';
var EYE='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';

function render(){
  var a=document.getElementById('app');
  if(STATE==='quiz') rQuiz(a);
  else if(STATE==='results') rResults(a);
  else rReview(a);
}

function rQuiz(a){
  var q=QS[cur], t=tried[cur], pct=Math.round((cur/QS.length)*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-label').textContent='Question '+(cur+1)+' of '+QS.length+' · '+q.skill;

  var ph=q.passageHtml||'';
  var qt='<div class="q-text">'+(q.qHtml||q.q||'')+'</div>';
  var ih='', fb='';

  if(q.type==='std'){
    ih=rStd(q,t);
    if(lastWrong&&!submitted) fb='<div class="feedback wrong">✗ '+lastWrong+'</div>';
    if(submitted) fb='<div class="feedback correct">✓ '+q.exp+'</div>';
  } else if(q.type==='dropdown'){
    ih=rDD(q);
    if(submitted) fb='<div class="feedback correct">✓ '+q.exp+'</div>';
    else if(lastWrong) fb='<div class="feedback wrong">✗ '+lastWrong+'</div>';
  }

  var hb=q.hint?'<button class="hint-btn'+(hintOn?' visible':'')+'" onclick="tHint()">'+EYE+(hintOpen?' Hide hint':' Show hint')+'</button>':'';
  var hr=q.hint?'<div class="hint-reveal'+(hintOpen?' open':'')+'"><strong>Hint:</strong> '+q.hint+'</div>':'';

  var ok=(q.type==='std')?(sel!==null&&!submitted):(ddSel!==null&&!submitted);
  var cb=!submitted?'<button class="btn btn-check"'+(ok?'':' disabled')+' onclick="doSub()">Check answer</button>':'';
  var nb=submitted?'<button class="btn btn-next" onclick="nxt()">Next question →</button>':'';
  var backCls=cur===0?'btn btn-back hidden':'btn btn-back';

  a.innerHTML=
    '<div class="badge-row"><span class="skill-badge" style="background:'+q.sb+';color:'+q.sc+'">'+q.skill+'</span><span class="maps-tag">'+q.mapsTo+'</span></div>'+
    '<div class="q-card">'+ph+qt+
    '<div class="tip-box"><div class="tip-header"><span class="tip-label">Coaching Tip</span>'+hb+'</div><div class="tip-text">'+q.tip+'</div>'+hr+'</div>'+
    ih+fb+
    '<div class="btn-row"><button class="'+backCls+'" onclick="bk()">← Back</button>'+cb+nb+'</div>'+
    '</div>';
}

function rStd(q,t){
  return '<div class="options">'+q.opts.map(function(o,i){
    var c='opt';
    if(t.indexOf(i)!==-1) c+=' wrong-tried disabled';
    else if(submitted&&i===q.ans) c+=' correct disabled';
    else if(!submitted&&sel===i) c+=' selected';
    else if(submitted) c+=' disabled';
    return '<div class="'+c+'" onclick="sO('+i+')"><div class="opt-letter">'+String.fromCharCode(65+i)+'</div><div class="opt-text">'+o+'</div></div>';
  }).join('')+'</div>';
}

function rDD(q){
  var opts=q.dropOptions.map(function(x,i){
    return '<option value="'+i+'"'+(ddSel===i?' selected':'')+'>'+x+'</option>';
  }).join('');
  var sel2=submitted
    ?'<select class="dd-select" disabled><option>'+q.dropOptions[q.ans]+'</option></select>'
    :'<select class="dd-select" onchange="sDD(this.value)"><option value="">— choose —</option>'+opts+'</select>';
  return '<div class="dropdown-row">'+(q.dropBefore||'')+' '+sel2+' '+(q.dropAfter||'')+'</div>';
}

function sO(i){ if(submitted||tried[cur].indexOf(i)!==-1)return; sel=i; lastWrong=null; render(); }
function sDD(v){ ddSel=v===''?null:parseInt(v); lastWrong=null; render(); }
function tHint(){ if(!hintOn)return; hintOpen=!hintOpen; render(); }

function doSub(){
  if(submitted)return;
  var q=QS[cur];
  if(q.type==='std'){
    if(sel===null)return;
    if(sel===q.ans){ submitted=true; scores[cur]=tried[cur].length===0; lastWrong=null; }
    else{ tried[cur].push(sel); hintOn=true; lastWrong=q.wrongs[sel]||"Not quite — use the hint for more guidance."; sel=null; }
  } else if(q.type==='dropdown'){
    if(ddSel===null)return;
    if(ddSel===q.ans){ submitted=true; scores[cur]=tried[cur].length===0; lastWrong=null; }
    else{ tried[cur].push(ddSel); hintOn=true; lastWrong="That word doesn't match the direction or meaning of the original. Use the hint."; ddSel=null; }
  }
  render();
}

function nxt(){
  if(cur<QS.length-1){
    cur++; sel=null; ddSel=null; submitted=false; lastWrong=null; hintOn=false; hintOpen=false; render();
  } else {
    STATE='results';
    document.getElementById('prog-fill').style.width='100%';
    document.getElementById('prog-label').textContent='Complete!';
    var _ft=scores.filter(function(s){return s===true;}).length;
    var _pct=Math.round(_ft/QS.length*100);
    // Build per-skill breakdown
    var _sm={};
    QS.forEach(function(q,i){
      var key=q.mapsTo||q.skill;
      if(!_sm[key])_sm[key]={skill:q.skill,standard:q.mapsTo||'',ok:0,tot:0};
      _sm[key].tot++;
      if(scores[i]===true)_sm[key].ok++;
    });
    var _skills=Object.keys(_sm).map(function(k){
      var d=_sm[k];
      return {standard:d.standard,skill:d.skill,ok:d.ok,tot:d.tot,pct:Math.round(d.ok/d.tot*100),needsPractice:d.ok<d.tot};
    });
    try{localStorage.setItem('doom_score_vivian_ajouz',JSON.stringify({student:'Vivian Ajouz',grade:3,score:_pct,first_try:_ft,total:QS.length,ts:new Date().toISOString(),synced:false,skills:_skills}));}catch(e){}
    _saveStatus='pending';
    render();
    fetch('http://localhost:8421/score',{method:'POST',mode:'cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({student:'Vivian Ajouz',grade:3,score:_pct,first_try:_ft,total:QS.length,skills:_skills})})
    .then(function(){
      _saveStatus='ok';
      try{var d=JSON.parse(localStorage.getItem('doom_score_vivian_ajouz')||'{}');d.synced=true;localStorage.setItem('doom_score_vivian_ajouz',JSON.stringify(d));}catch(e){}
      var el=document.getElementById('score-save-status');
      if(el) el.innerHTML='<span style="color:#1D9E75;font-weight:600">&#10003; Score saved</span>';
    })
    .catch(function(){
      _saveStatus='fail';
      var el=document.getElementById('score-save-status');
      if(el) el.innerHTML='<span style="color:#E24B4A;font-weight:600">&#9888; Server offline — tell your teacher: <strong>'+_pct+'%</strong></span>';
    });
  }
}

function bk(){
  if(cur===0)return;
  cur--; sel=null; ddSel=null;
  submitted=scores[cur]!==null;
  lastWrong=null; hintOn=false; hintOpen=false;
  render();
}

function rResults(a){
  var ft=scores.filter(function(s){return s===true;}).length, tot=QS.length, pct=Math.round((ft/tot)*100);
  var sm={};
  QS.forEach(function(q,i){
    if(!sm[q.skill]) sm[q.skill]={tot:0,ok:0};
    sm[q.skill].tot++;
    if(scores[i]===true) sm[q.skill].ok++;
  });
  var rows=Object.keys(sm).map(function(sk){
    var d=sm[sk], ok=d.ok===d.tot;
    return '<tr><td>'+sk+'</td><td>'+d.ok+' / '+d.tot+'</td><td><span class="'+(ok?'pill-ok':'pill-no')+'">'+(ok?'✓ Mastered':'⚠ Review')+'</span></td></tr>';
  }).join('');
  var r=52, c=2*Math.PI*r, d=(pct/100)*c;
  var _st=_saveStatus==='ok'?'<span style="color:#1D9E75;font-weight:600">&#10003; Score saved</span>':_saveStatus==='fail'?'<span style="color:#E24B4A;font-weight:600">&#9888; Server offline &#8212; tell your teacher: <strong>'+pct+'%</strong></span>':_saveStatus==='pending'?'<span style="color:#888">Saving score&#8230;</span>':'';
  a.innerHTML='<div class="results-card">'+
    '<div class="score-ring"><svg width="120" height="120" viewBox="0 0 120 120">'+
    '<circle cx="60" cy="60" r="'+r+'" fill="none" stroke="#e5e3f7" stroke-width="12"/>'+
    '<circle cx="60" cy="60" r="'+r+'" fill="none" stroke="#534AB7" stroke-width="12" stroke-dasharray="'+d.toFixed(1)+' '+c.toFixed(1)+'" stroke-linecap="round"/>'+
    '</svg><div class="score-pct">'+pct+'%</div></div>'+
    '<div class="results-title">Practice Complete!</div>'+
    '<div class="results-sub">'+ft+' of '+tot+' first-try correct · Targeted for G3.5</div>'+
    '<table class="skill-table"><thead><tr><th>Skill</th><th>Score</th><th>Status</th></tr></thead><tbody>'+rows+'</tbody></table>'+
    '<div style="margin-bottom:20px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center">'+
    '<button class="btn" style="background:#f0eefd;color:#534AB7;border:2px solid #534AB7" onclick="goReview()">Review all answers</button>'+
    '<button class="btn" style="background:#534AB7;color:#fff" onclick="restart()">Practice again</button>'+
    '<button id="copy-insights-btn" class="btn" style="background:#fff7e6;color:#b45309;border:2px solid #f59e0b" onclick="copyInsights()">&#128203; Copy insights for plan</button>'+
    '</div>'+
    '<div id="score-save-status" style="font-size:13px;min-height:20px">'+_st+'</div>'+
    '</div>';
}

function copyInsights(){
  var ft=scores.filter(function(s){return s===true;}).length, tot=QS.length, pct=Math.round((ft/tot)*100);
  var sm={};
  QS.forEach(function(q,i){
    var key=q.mapsTo||q.skill;
    if(!sm[key])sm[key]={skill:q.skill,standard:q.mapsTo||'',ok:0,tot:0};
    sm[key].tot++;
    if(scores[i]===true)sm[key].ok++;
  });
  var needs=[], mastered=[];
  Object.keys(sm).forEach(function(k){
    var d=sm[k];
    var line=(d.standard?d.standard+' — ':'')+d.skill+' ('+d.ok+'/'+d.tot+' correct)';
    if(d.ok<d.tot) needs.push('⚠ '+line);
    else mastered.push('✓ '+line);
  });
  var dt=new Date().toLocaleDateString();
  var txt='Vivian Ajouz — G3.5 Practice Test ('+dt+')\n'
    +'Score: '+pct+'% ('+ft+'/'+tot+' first try)\n';
  if(needs.length) txt+='\nNeeds more practice:\n'+needs.join('\n');
  if(mastered.length) txt+='\n\nMastered:\n'+mastered.join('\n');
  navigator.clipboard.writeText(txt)
    .then(function(){
      var btn=document.getElementById('copy-insights-btn');
      if(btn){btn.textContent='✓ Copied!';setTimeout(function(){btn.textContent='📋 Copy insights for plan';},2200);}
    })
    .catch(function(){alert(txt);});
}

function restart(){
  cur=0; sel=null; ddSel=null; submitted=false;
  scores=QS.map(function(){return null;});
  tried=QS.map(function(){return [];});
  lastWrong=null; hintOn=false; hintOpen=false; STATE='quiz'; _saveStatus='';
  document.getElementById('prog-fill').style.width='0%';
  render();
}

function goResults(){ STATE='results'; render(); }
function goReview(){ STATE='review'; render(); }

function rReview(a){
  var html='<div class="rev-top">'+
    '<button class="btn" style="background:#f0eefd;color:#534AB7;border:2px solid #534AB7" onclick="goResults()">← Back to results</button>'+
    '<button class="btn" style="background:#534AB7;color:#fff" onclick="restart()">Practice again</button>'+
    '</div>';
  QS.forEach(function(q,i){
    var ft=scores[i]===true, t=tried[i], att=t.length+1;
    var lbl=ft?'✓ First try':'✗ Needed '+att+' attempt'+(att>1?'s':'');
    var cls='rev-card '+(ft?'ft':'nr');
    var ph=q.passageHtml?q.passageHtml.replace('passage-box','rev-pass'):'';
    var qt=q.qHtml||q.q||'';
    var arr=q.type==='dropdown'?q.dropOptions:q.opts;
    var oh=arr.map(function(x,j){
      var oc='rev-opt '+(j===q.ans?'c':t.indexOf(j)!==-1?'w':'n');
      return '<div class="'+oc+'"><strong>'+String.fromCharCode(65+j)+'.</strong> '+x+'</div>';
    }).join('');
    html+='<div class="'+cls+'">'+
      '<div class="rev-label">'+
        '<span style="color:'+q.sc+'">'+q.skill+' · '+q.teks+' · '+q.mapsTo+'</span>'+
        '<span style="color:'+(ft?'#145a38':'#8B1A1A')+'">'+lbl+'</span>'+
      '</div>'+
      ph+'<div class="rev-q">'+qt+'</div>'+oh+
      '<div class="rev-exp"><strong>Why:</strong> '+q.exp+'</div>'+
    '</div>';
  });
  a.innerHTML=html;
}

render();
</script>
</body>
</html>
